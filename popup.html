<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>readlike</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
      --accent: #1d9bf0; --accent-glow: rgba(29,155,240,0.22);
      --green: #00d084; --red: #f4212e; --yellow: #f59e0b;
      --text: #e8e8f0; --muted: #6e6e8a;
    }
    body { width: 300px; background: var(--bg); color: var(--text); font-family: 'Syne', system-ui, sans-serif; overflow: hidden; }

    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 20px 14px; position: relative; overflow: hidden; }
    .header::before { content:''; position:absolute; top:-30px; right:-30px; width:100px; height:100px; border-radius:50%; background:var(--accent-glow); filter:blur(30px); pointer-events:none; }
    .logo-row { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
    .heart-icon { font-size:22px; filter:drop-shadow(0 0 8px var(--accent)); animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    .title { font-size:17px; font-weight:800; letter-spacing:-0.3px; }
    .subtitle { font-size:11px; color:var(--muted); margin-left:32px; }

    .body { padding: 18px; display:flex; flex-direction:column; gap:12px; }

    .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; }
    .card.active { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent-glow),inset 0 0 20px var(--accent-glow); }

    .row { display:flex; align-items:center; justify-content:space-between; }
    .label strong { font-size:13px; font-weight:700; display:block; }
    .label span { font-size:11px; color:var(--muted); }

    .switch { position:relative; width:46px; height:26px; flex-shrink:0; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:var(--border); border-radius:50px; cursor:pointer; transition:background .25s; }
    .slider::before { content:''; position:absolute; height:20px; width:20px; left:3px; bottom:3px; background:white; border-radius:50%; transition:transform .25s; box-shadow:0 1px 4px rgba(0,0,0,.4); }
    input:checked + .slider { background:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
    input:checked + .slider::before { transform:translateX(20px); }
    #unlimitedSwitch:checked + .slider { background: var(--green); box-shadow:0 0 12px rgba(0,208,132,0.3); }

    .status-badge { display:flex; align-items:center; gap:8px; padding:9px 14px; border-radius:10px; font-size:12px; font-weight:600; background:var(--surface); border:1px solid var(--border); }
    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .status-badge.on .status-dot { background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 1.5s ease-in-out infinite; }
    .status-badge.off .status-dot { background:var(--muted); }
    .status-badge.limit .status-dot { background:var(--red); box-shadow:0 0 6px var(--red); }
    .status-badge.unlimited .status-dot { background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .slider-block { display:flex; flex-direction:column; gap:10px; }
    .slider-row { display:flex; flex-direction:column; gap:6px; }
    .slider-header { display:flex; justify-content:space-between; align-items:center; }
    .slider-header small { font-size:11px; color:var(--muted); font-weight:600; }
    .badge { background:var(--accent); color:#fff; font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; }
    .badge.red { background: var(--red); }
    .badge.green { background: var(--green); }

    input[type=range] { -webkit-appearance:none; width:100%; height:4px; border-radius:4px; outline:none; cursor:pointer; transition:opacity .2s; }
    input[type=range]:disabled { opacity:0.3; cursor:not-allowed; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px var(--accent-glow); cursor:pointer; }
    #limitRange::-webkit-slider-thumb { background: var(--red); box-shadow:0 0 6px rgba(244,33,46,0.3); }
    .range-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); }

    .counter-bar { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
    .counter-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .counter-top span { font-size:11px; color:var(--muted); font-weight:600; }
    .counter-num { font-size:18px; font-weight:800; color:var(--text); }
    .counter-num em { font-size:12px; font-style:normal; color:var(--muted); font-weight:400; }
    .progress-track { background:var(--border); border-radius:99px; height:5px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:99px; background:var(--accent); transition:width .4s ease; }
    .progress-fill.warning { background: var(--yellow); }
    .progress-fill.danger  { background: var(--red); }
    .progress-fill.unlimited { background: var(--green); width:100% !important; }

    .footer { padding:10px 18px; border-top:1px solid var(--border); font-size:10px; color:var(--muted); text-align:center; }
    .footer a { color:var(--accent); text-decoration:none; cursor:pointer; }
    .footer a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-row">
      <span class="heart-icon">❤️</span>
      <span class="title">readlike</span>
    </div>
    <div class="subtitle">Curte o que você realmente leu</div>
  </div>

  <div class="body">

    <!-- Toggle principal -->
    <div class="card" id="toggleCard">
      <div class="row">
        <div class="label">
          <strong>Auto curtir</strong>
          <span>Ao parar num post</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggleSwitch" checked />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Status -->
    <div class="status-badge on" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">Monitorando seu feed...</span>
    </div>

    <!-- Sliders -->
    <div class="card">
      <div class="slider-block">

        <div class="slider-row">
          <div class="slider-header">
            <small>⏱ Tempo para curtir</small>
            <span class="badge" id="timeLabel">3s</span>
          </div>
          <input type="range" id="timeRange" min="2" max="8" step="0.5" value="3" />
          <div class="range-labels"><span>2s</span><span>8s</span></div>
        </div>

        <!-- Limite diário + toggle ilimitado -->
        <div class="slider-row" style="margin-top:4px">
          <div class="slider-header">
            <small>🔒 Limite diário</small>
            <span class="badge red" id="limitLabel">100/dia</span>
          </div>
          <input type="range" id="limitRange" min="20" max="500" step="10" value="100" />
          <div class="range-labels"><span>20</span><span>500</span></div>
        </div>

        <!-- Toggle ilimitado -->
        <div class="row" style="margin-top:2px; padding-top:10px; border-top:1px solid var(--border)">
          <div class="label">
            <strong>♾️ Ilimitado</strong>
            <span>Sem teto de curtidas</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="unlimitedSwitch" />
            <span class="slider"></span>
          </label>
        </div>

      </div>
    </div>

    <!-- Contador do dia -->
    <div class="counter-bar">
      <div class="counter-top">
        <span>Curtidas hoje</span>
        <span class="counter-num"><span id="countNum">0</span> <em id="countOf">/ 100</em></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

  </div>

  <div class="footer">
    readlike • by <a id="twitterLink" href="#">@WilliamP2P</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
